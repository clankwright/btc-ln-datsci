[pytest]
# Exclude live-API and notebook-execution tests from the default run.
# live:     opt-in via `pytest -m live` (or `make smoke`)
# notebook: opt-in via `pytest -m notebook` — spawns a Jupyter kernel (slower)
addopts = -m "not live and not notebook"
markers =
    live: hits the real mempool.space API; excluded from the default run (run with `pytest -m live`)
    notebook: executes a Jupyter notebook via nbconvert; run with `pytest -m notebook`
